name: Tests V2 (Modern)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-legacy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.2]
        laravel: [11.*]
        dependency-version: [prefer-stable]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Containers
        run: docker compose build

      - name: Run Tests (PHP 8.2)
        run: |
          docker compose run --rm test-modern composer update --no-interaction --prefer-dist
          docker compose run --rm test-modern vendor/bin/pest
